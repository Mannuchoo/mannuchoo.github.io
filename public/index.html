<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.socket.io https://*.ngrok-free.app https://*.ngrok-free.dev;
        connect-src 'self' https://ipapi.co https://*.ipapi.co https://polysoko.com https://api.weatherapi.com https://nominatim.openstreetmap.org https://*.loca.lt https://*.ngrok-free.app https://*.ngrok-free.dev https://*.ngrok.io http://localhost:* ws: wss: https://uncorrelative-unportly-catalina.ngrok-free.dev;
        frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;
        media-src 'self' data: blob: https:;
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
        font-src 'self' https://cdnjs.cloudflare.com;
        img-src 'self' data: https: http://localhost:*;
    ">

    <title>PolySoko | Predictions</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script>
        // Load socket.io client differently when served from GitHub Pages
        (function(){
            try {
                var host = window.location.hostname || '';
                var s = document.createElement('script');
                if (host.includes('github.io')) {
                    s.src = 'https://cdn.socket.io/4.7.2/socket.io.min.js';
                } else {
                    s.src = '/socket.io/socket.io.js';
                }
                s.defer = false;
                document.head.appendChild(s);
            } catch (e) { console.warn('Socket loader failed', e); }
        })();
    </script>
    
    <!-- GitHub Pages Backend Configuration -->
    <script>
        if (window.location.hostname.includes('github.io')) {
            window.addEventListener('DOMContentLoaded', () => {
                if (window.showBackendSetupPrompt) {
                    window.showBackendSetupPrompt();
                } else {
                    console.log('📍 GitHub Pages detected. If no prompt appears, set localStorage.backend_url to your ngrok URL and reload.');
                }
            });
        }
    </script>

    <script src="ui.js" defer></script>
    <script src="api.js" defer></script>
    <script src="app.js" defer></script>

</head>

<body>

<!-- HEADER -->
<header class="mobile-header">
    <div class="header-left">
        <button class="hamburger" id="hamburgerBtn">☰</button>
        <div class="logo">POLYSOKO</div>
    </div>
    <button class="profile-trigger" id="profileBtn">
        <img id="headerAvatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" class="header-avatar" alt="" style="background: #222;">
        👤 <span id="userNameHeader">User</span>
    </button>
</header>

<!-- MODULES -->
<div id="sidebar-placeholder"></div>
<div id="profile-placeholder"></div>
<div id="history-placeholder"></div>

<!-- ENHANCED MARKET MODAL -->
<div id="richModal" class="modal-overlay modal-rich" style="display:none;" onclick="if(event.target.id === 'richModal') closeMarket()">
    <div class="modal-container">
        <div class="modal-header-bar">
            <div class="modal-header-title">📊 Market Details</div>
            <button class="modal-close-btn" onclick="closeMarket()" title="Close">✕</button>
        </div>
        <div id="modalBody" class="modal-body-content"></div>
    </div>
</div>
<!-- MAIN APP -->
 <main class="dashboard-main">

    <!-- HISTORY CARD -->
    <div class="history-card" onclick="openHistory()"></div>

<div class="top-dashboard-row">

    <div class="greeting-wrapper">
        <h1 id="greetingText" class="greeting-text"></h1>
        <p id="greetingMeta" class="greeting-meta"></p>
    </div>

    <div class="balance-admin-row-wrapper" style="display: contents;">
        <!-- Container for Balance + Admin button row -->
        <div class="balance-admin-container" id="balAdminRow">
            <div class="balance-card-dark" id="balanceCardInstance">
                <!-- Rendered by window.renderBalanceCard -->
            </div>
        </div>
    </div>

</div>

    <!-- TRENDING -->
    <div class="section-row">
        <span class="section-title">CHECK OUT 📈</span>
    </div>

    <div id="ongoing" class="trending-horizontal-scroll"></div>

    <!-- CATEGORY FILTER -->
    <div class="category-filter-row">
        <button class="pill active" data-cat="all" onclick="setCategory('all')">All</button>
        <button class="pill" data-cat="football" onclick="setCategory('football')">⚽ Football</button>
        <button class="pill" data-cat="crypto" onclick="setCategory('crypto')">🪙 Crypto</button>
        <button class="pill" data-cat="news" onclick="setCategory('news')">📰 News</button>
        <button class="pill" data-cat="weather" onclick="setCategory('weather')">🌦️ Weather</button>
        <button class="pill" data-cat="politics" onclick="setCategory('politics')">⚖️ Politics</button>
        <button class="pill" data-cat="tech" onclick="setCategory('tech')">💻 Tech</button>
    </div>
    <!-- MARKETS -->
    <div class="section-row">
        <span class="section-title">ALL MARKETS</span>
    </div>

    <div id="marketsList" class="markets-vertical-stack"></div>


    <div id="bet-modal" 
     onclick="window.handleOutsideClick(event)" 
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
    
    <div id="modal-content" 
         onclick="event.stopPropagation()" 
         style="background:#1a1b22; width:90%; max-width:350px; padding:25px; border-radius:16px; border:1px solid #333; text-align:center;">
        
        <h2 style="color:#00ff88; margin-bottom:10px;">Confirm Your Bet</h2>
        <p id="modal-market-title" style="color:white; font-weight:bold;"></p>
        <p id="modal-pick-display" style="color:#aaa; font-size:0.9rem; margin-bottom:20px;"></p>

        <div style="margin-bottom:20px; text-align:left;">
            <label style="color:#888; font-size:0.8rem;">STAKE (KES)</label>
            <input type="number" id="bet-amount-input" value="10"
                style="width:100%; padding:15px; background:#000; border:1px solid #444; border-radius:8px; color:white; font-size:1.2rem; text-align:center;">
        </div>

        <div style="display:flex; gap:12px;">
            <button onclick="window.closeBetModal()" style="flex:1; padding:12px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">Go Back</button>
            <button id="confirm-proceed-btn" onclick="window.processConfirmedBet()" style="flex:1; padding:12px; background:#00ff88; color:black; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Proceed</button>
        </div>
    </div>
</div>
<div id="withdrawModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Withdraw Funds</h3>
            <button onclick="toggleWithdrawModal()" class="close-btn">✕</button>
        </div>
        <div class="modal-body">
            <p style="color: gray; font-size: 0.8rem;">Minimum withdrawal: 100 sKES</p>
            <input type="number" id="withdrawAmount" placeholder="Enter amount" class="premium-input">
            <button onclick="handleWithdrawSubmit()" class="premium-action-btn">
                Request Withdrawal
            </button>
        </div>
    </div>
</div>
</main>
</body>
</html>
