<!DOCTYPE html>
<html>
<head>
    <title>PolySoko | Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#070b10">
    <meta property="og:site_name" content="PolySoko">
    <meta property="og:title" content="PolySoko">
    <meta property="og:image" content="https://polysoko.online/icon-512.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" style="background: #0b0c10;">
    <div id="resetBox" class="auth-card">
        <h2 id="loginWelcome">Update Password</h2>
        <p style="color:#888; font-size:0.85rem; margin-bottom:20px; text-align:center;">Enter the code sent to your phone and a new password.</p>
        
        <input type="text" id="smsOtp" placeholder="6-Digit SMS Code" maxlength="6" style="text-align:center; font-weight:bold; letter-spacing:5px;">
        <input type="password" id="newPass" placeholder="New Password">
        <input type="password" id="confirmPass" placeholder="Confirm New Password">
        
        <button class="btn-login" onclick="submitReset()">Update Password</button>
        <p id="msg" style="font-size: 12px; margin-top: 15px; text-align:center;"></p>
    </div>

    <script src="api.js"></script>
    <script>
        window.onload = () => { 
            if(window.showWelcomeHeader) window.showWelcomeHeader(); 
            
            // Auto-fill OTP from URL if present
            const params = new URLSearchParams(window.location.search);
            const otp = params.get('otp');
            const otpInput = document.getElementById('smsOtp');
            if (otp && otpInput) otpInput.value = otp;
        };

        async function submitReset() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const otp = document.getElementById('smsOtp').value.trim();
            const password = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const msg = document.getElementById('msg');

            if(!token) return alert("Reset link is missing a token. Please request a new reset link.");
            if(!otp) return alert("Please enter the SMS code");
            if(password.length < 6) return alert("Password must be at least 6 characters");
            if(password !== confirm) return alert("Passwords do not match");

            try {
                msg.style.color = "#888";
                msg.innerText = "Updating password...";
                const data = await (window.API?.resetPassword
                    ? window.API.resetPassword(token, password, otp)
                    : apiFetch('reset-password', {
                    method: 'POST',
                    body: { token, newPassword: password, otp }
                }));
                if(data.success) {
                    msg.style.color = "#00ff88";
                    msg.innerText = "Success! Redirecting to login...";
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    msg.style.color = "#ff4444";
                    msg.innerText = data.message || "Reset failed";
                }
            } catch(e) {
                msg.style.color = "#ff4444";
                msg.innerText = e.message || "Error resetting password.";
            }
        }
    </script>
</body>
</html>
