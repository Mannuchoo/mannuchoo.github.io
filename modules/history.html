<div id="historyCenter" class="history-container">
    <div class="history-window">

        <!-- MAIN CATEGORY TABS -->
        <div class="history-header">

            <button class="hist-tab active" onclick="switchBetTab('predictions', this)">
                Predictions
            </button>

            <button class="hist-tab" onclick="switchBetTab('transactions', this)">
                Transactions
            </button>

            <button class="close-hist" onclick="closeHistory()">✕</button>

        </div>

        <!-- CONTENT AREA (Nav + List) -->
        <div class="bet-scroll-area" id="bet-container">

            <!-- JavaScript will inject Sub-Nav + List here -->
            <div class="empty-state">
                Select a category to view history...
            </div>

        </div>

    </div>
</div>
