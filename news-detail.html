<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>News Market Details | PolySoko</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script>
        (function(){
            var host = window.location.hostname || "";
            var isLocal = host === "localhost" || host === "127.0.0.1";
            var script = document.createElement("script");
            script.src = isLocal ? "/socket.io/socket.io.js" : "https://cdn.socket.io/4.7.2/socket.io.min.js";
            document.head.appendChild(script);
        })();
    </script>
    <script src="ui.js" defer></script>
    <script src="api.js" defer></script>
    <script src="app.js" defer></script>
    <style>
        .news-detail-page {
            min-height: 100vh;
            background: #070b10;
            padding-top: 70px;
        }
        
        .news-detail-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .news-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }
        
        .news-detail-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #00ff88;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .news-detail-back:hover {
            gap: 12px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        .news-detail-content {
            background: linear-gradient(135deg, rgba(18, 24, 33, 0.95) 0%, rgba(10, 15, 22, 0.98) 100%);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .news-detail-title {
            font-size: 2rem;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        .news-detail-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }
        
        .news-detail-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 0.9rem;
        }
        
        .news-detail-meta-label {
            color: #00ff88;
            font-weight: 700;
        }
        
        .news-detail-body {
            margin-bottom: 28px;
            line-height: 1.8;
            color: #e5e7eb;
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .news-detail-actions {
            display: flex;
            gap: 12px;
            margin: 28px 0;
        }
        
        .news-detail-actions button {
            flex: 1;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-yes-detail {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.25) 0%, rgba(0, 200, 100, 0.15) 100%);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
        }
        
        .btn-yes-detail:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.4) 0%, rgba(0, 200, 100, 0.25) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.35);
            transform: translateY(-2px);
        }
        
        .btn-no-detail {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.25) 0%, rgba(200, 50, 50, 0.15) 100%);
            border: 1px solid rgba(255, 77, 79, 0.5);
            color: #ff6b6b;
        }
        
        .btn-no-detail:hover {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.4) 0%, rgba(200, 50, 50, 0.25) 100%);
            box-shadow: 0 0 20px rgba(255, 77, 79, 0.35);
            transform: translateY(-2px);
        }
        
        .news-detail-info {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #00ff88;
            font-size: 1.2rem;
        }
        
        @media (max-width: 768px) {
            .news-detail-page {
                padding-top: 60px;
            }
            
            .news-detail-title {
                font-size: 1.6rem;
            }
            
            .news-detail-container {
                padding: 16px;
            }
            
            .news-detail-content {
                padding: 20px;
            }
            
            .news-detail-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<header class="mobile-header">
    <div class="header-left">
        <button class="hamburger" id="hamburgerBtn">☰</button>
        <div class="logo">POLYSOKO</div>
    </div>
    <button class="profile-trigger" id="profileBtn">
        <img id="headerAvatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" class="header-avatar" alt="" style="background:#222;">
        👤 <span id="userNameHeader">User</span>
    </button>
</header>

<!-- MODULES -->
<div id="sidebar-placeholder"></div>
<div id="profile-placeholder"></div>

<!-- BET MODAL -->
<div id="bet-modal" 
     onclick="window.handleOutsideClick(event)" 
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
    <div id="modal-content" 
         onclick="event.stopPropagation()" 
         style="background:#1a1b22; width:90%; max-width:350px; padding:25px; border-radius:16px; border:1px solid #333; text-align:center;">
        <h2 style="color:#00ff88; margin-bottom:10px;">Confirm Your Bet</h2>
        <p id="modal-market-title" style="color:white; font-weight:bold;"></p>
        <p id="modal-pick-display" style="color:#aaa; font-size:0.9rem; margin-bottom:20px;"></p>
        <div style="margin-bottom:20px; text-align:left;">
            <label style="color:#888; font-size:0.8rem;">STAKE (KES)</label>
            <input type="number" id="bet-amount-input" value="10"
                style="width:100%; padding:15px; background:#000; border:1px solid #444; border-radius:8px; color:white; font-size:1.2rem; text-align:center;">
        </div>
        <div style="display:flex; gap:12px;">
            <button onclick="window.closeBetModal()" style="flex:1; padding:12px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">Go Back</button>
            <button id="confirm-proceed-btn" onclick="window.processConfirmedBet()" style="flex:1; padding:12px; background:#00ff88; color:black; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Proceed</button>
        </div>
    </div>
</div>

<main class="news-detail-page">
    <div class="news-detail-container">
        <div class="news-detail-header">
            <a class="news-detail-back" onclick="window.history.back()" title="Go back">
                <span>← Back</span>
            </a>
            <div style="color: #00ff88; font-size: 0.85rem; font-weight: 600;">📰 NEWS MARKET</div>
        </div>
        
        <div id="newsDetailContent" class="news-detail-content">
            <div class="loading-spinner">🔄 Loading market details...</div>
        </div>
    </div>
</main>

<script>
    // Get market ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const marketId = urlParams.get('id');

    window.onload = async () => {
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
            return;
        }

        try {
            // Load modules
            if (typeof loadModules === "function") await loadModules();
            if (typeof activateModules === "function") activateModules();
            
            // Fetch market
            const markets = await fetchMarkets().catch(e => console.warn(e));
            if (markets && Array.isArray(markets.markets)) {
                window.state = window.state || {};
                window.state.allMarkets = markets.markets;
                window.allMarketsSource = markets.markets;
                
                // Sync market map
                if (typeof syncMarketMap === "function") syncMarketMap(markets.markets);
            }

            // Load and display news
            renderNewsDetail(marketId);
        } catch (err) {
            console.error("Page init error:", err);
            document.getElementById('newsDetailContent').innerHTML = `
                <div style="text-align: center; color: #ff4d4f; padding: 40px;">
                    ❌ Error loading market. Please go back and try again.
                </div>
            `;
        }
    };

    function renderNewsDetail(id) {
        const m = window.marketMap?.[id] || window.state?.allMarkets?.find(x => x.id === id);
        const content = document.getElementById('newsDetailContent');
        
        if (!m) {
            content.innerHTML = `
                <div style="text-align: center; color: #ff4d4f; padding: 40px;">
                    ❌ Market not found
                </div>
            `;
            return;
        }

        const safeTitle = (m.betQuestion || m.title || "").replace(/'/g, "\\'");
        
        // Extract article content from multiple possible fields
        const articleContent = m.content || m.description || m.article || m.body || "The full story is being updated...";
        
        // Extract image from multiple possible fields
        const imageUrl = m.media_url || m.urlToImage || m.image || m.imgUrl || '';
        
        // Extract source information
        const sourceInfo = m.source || (m.source?.name) || m.sourceName || 'News Source';
        
        // Format publication date
        const pubDate = m.timestamp || m.publishedAt || m.published_at || new Date().toISOString();
        const formattedDate = new Date(pubDate).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'});
        
        // Escape HTML
        const escapeHtml = (text) => {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };
        
        const media = imageUrl ? `<div style="margin-bottom:20px; overflow:hidden; border-radius:12px;"><img src="${escapeHtml(imageUrl)}" style="width:100%; max-height:400px; object-fit:cover;" alt="Article image" onerror="this.parentElement.style.display='none'"></div>` : '';

        content.innerHTML = `
            ${media}
            <h1 class="news-detail-title">${escapeHtml(m.betQuestion || m.title)}</h1>
            
            <div class="news-detail-meta">
                <div class="news-detail-meta-item">
                    <span class="news-detail-meta-label">📰 Source:</span>
                    <span>${escapeHtml(typeof sourceInfo === 'string' ? sourceInfo : sourceInfo?.name || 'News Source')}</span>
                </div>
                <div class="news-detail-meta-item">
                    <span class="news-detail-meta-label">📅 Published:</span>
                    <span>${formattedDate}</span>
                </div>
                <div class="news-detail-meta-item">
                    <span class="news-detail-meta-label">Status:</span>
                    <span style="text-transform: capitalize;">${m.status || 'Open'}</span>
                </div>
                ${m.category ? `<div class="news-detail-meta-item">
                    <span class="news-detail-meta-label">Category:</span>
                    <span>${escapeHtml(m.category)}</span>
                </div>` : ''}
            </div>
            
            <div class="news-detail-body">
                ${escapeHtml(articleContent).split('\\n').join('<br>')}
            </div>
            
            ${m.url ? `<div class="news-detail-info" style="margin-top: 24px;">
                <strong style="color: #00ff88; display: block; margin-bottom: 8px;">📖 Read Full Article</strong>
                <a href="${escapeHtml(m.url)}" target="_blank" rel="noopener noreferrer" style="color: #00ff88; text-decoration: none; word-break: break-all; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
                    ${escapeHtml(m.url)} <span style="color: #888;">↗</span>
                </a>
            </div>` : ''}
            
            <div class="news-detail-actions">
                <button class="btn-yes-detail" onclick="openBetModal('${m.id}', '${safeTitle}', 'Yes')">
                    👍 YES - It Will Happen
                </button>
                <button class="btn-no-detail" onclick="openBetModal('${m.id}', '${safeTitle}', 'No')">
                    👎 NO - It Won't Happen
                </button>
            </div>
            
            <div class="news-detail-info" style="margin-top: 24px; background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.2);">
                <strong style="color: #00ff88; display: block; margin-bottom: 12px;">📊 Market Info</strong>
                <div style="font-size: 0.9rem; color: #ccc;">
                    <div style="margin-bottom: 8px;">
                        <span style="color: #888;">Odds:</span>
                        <span style="color: #00ff88; font-weight: 700; margin: 0 8px;">YES ${Number(m.oddsA || 1.9).toFixed(2)}</span>
                        <span style="color: #ff6b6b; font-weight: 700;">NO ${Number(m.oddsB || 1.9).toFixed(2)}</span>
                    </div>
                    ${m.volume ? `<div style="margin-bottom: 8px;">
                        <span style="color: #888;">Volume:</span>
                        <span style="margin-left: 8px;">${Number(m.volume).toLocaleString()} sKES</span>
                    </div>` : ''}
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
